<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disney Character Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>✨ Disney Character Generator</h1>

        <button id="loadBtn">Get New Character</button>

                Loading...

            <img id="characterImage" src="" alt="Character Image">

            <h3 id="characterName"></h3>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
